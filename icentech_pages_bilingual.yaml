pages:
  - slug: /
    key: home
    seo_title_zh: iCentech | 帮助品牌走向全球
    seo_title_en: iCentech | We Help Brands Go Global
    hero_zh: 帮助品牌走向全球，驱动国际化增长。
    hero_en: We help brands go global and drive international growth.
    intro_zh: iCentech 通过语言服务、本地化工程和 AI 赋能流程，让您的产品、内容与服务更快进入目标市场。
    intro_en: Through language services, localization engineering, and AI-enabled workflows, iCentech helps your products, content, and services reach target markets faster.
    cta_zh: 联系我们
    cta_en: Get in Touch

  - slug: /translation
    key: translation
    title_zh: 翻译服务
    title_en: Translation
    summary_zh: 覆盖软件、文档、网站、法律及营销内容，提供术语管理、审校、后编辑与质量评估。
    summary_en: Covers software, documents, websites, legal and marketing content with terminology management, review, post-editing, and quality evaluation.
    deliverables_zh:
      - 文本翻译与本地化
      - 术语库与风格指南
      - 审校与语言测试
      - 机器翻译后编辑
    deliverables_en:
      - Translation and localization
      - Terminology base and style guide
      - Review and linguistic testing
      - MT post-editing

  - slug: /dtp
    key: dtp
    title_zh: DTP 排版
    title_en: DTP
    summary_zh: 多语种排版与文件工程，兼顾视觉一致性与语言适配。
    summary_en: Multilingual desktop publishing and file engineering with visual consistency and language adaptation.

  - slug: /engineering
    key: engineering
    title_zh: 国际化工程
    title_en: Engineering
    summary_zh: 提供 I18N 工程支持、代码适配、构建与系统集成。
    summary_en: Provides I18N engineering support, code adaptation, build, and integration.

  - slug: /testing
    key: testing
    title_zh: 本地化测试
    title_en: Testing
    summary_zh: 平台兼容、区域数据处理验证与本地化体验验证。
    summary_en: Platform compatibility, regional data handling verification, and localization experience validation.

  - slug: /video-production
    key: video-production
    title_zh: 多语视频制作
    title_en: Video Production
    summary_zh: 从转写、翻译到字幕、配音与同步的一体化交付。
    summary_en: End-to-end delivery from transcription and translation to subtitling, dubbing, and synchronization.

  - slug: /interpreting
