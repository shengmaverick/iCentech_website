name: Build Static Site

on:
  pull_request:
    paths:
      - "content/**"
      - "design-system/**"
      - "tools/generate_static_site.py"
      - "tools/import_blog_content.py"
      - ".github/workflows/build-static-site.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "content/**"
      - "design-system/**"
      - "tools/generate_static_site.py"
      - "tools/import_blog_content.py"
      - ".github/workflows/build-static-site.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate static site
        run: python3 tools/generate_static_site.py
      - name: Upload generated site artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: static-site
