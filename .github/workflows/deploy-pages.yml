name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "brand/**"
      - "content/**"
      - "design-system/**"
      - "tools/generate_static_site.py"
      - "tools/import_blog_content.py"
      - ".github/workflows/build-static-site.yml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
      SITE_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate static site
        run: python3 tools/generate_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
